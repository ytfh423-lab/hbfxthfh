name: Build Claude Code CN

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: bun-windows-x64
            artifact: claude-cn-windows-x64
            ext: .exe
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: claude-cn-linux-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: claude-cn-darwin-arm64
            ext: ""

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --no-save
        timeout-minutes: 10

      - name: Build
        env:
          BUILD_TARGET: ${{ matrix.target }}
          NODE_ENV: production
        run: bun run scripts/build.ts
        timeout-minutes: 15

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/claude${{ matrix.ext }}
